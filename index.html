<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Content-Security-Policy" 
      content="default-src 'self';
               script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline' 'unsafe-eval';
               style-src 'self' https://cdnjs.cloudflare.com 'unsafe-inline';
               img-src 'self' data: https: blob:;
               font-src 'self' https://cdnjs.cloudflare.com;
               connect-src 'self' https://*.supabase.co wss://*.supabase.co;
               frame-src 'self'">
  <title>SALLAM - Marketplace</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ============================================
       SALLAM — Marketplace CSS
       Design: Maghreb Modern — chaud, net, premium
       ============================================ */

    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

    /* ── Variables ─────────────────────────────── */
    :root {
      --primary:       #2563eb;
      --primary-dark:  #1d4ed8;
      --primary-light: #eff6ff;
      --accent:        #f43f5e;
      --accent-dark:   #e11d48;
      --premium:       #f59e0b;

      --bg:            #f1f5f9;
      --surface:       #ffffff;
      --surface-2:     #f8fafc;
      --border:        #e2e8f0;
      --border-hover:  #cbd5e1;

      --text-1:        #0f172a;
      --text-2:        #475569;
      --text-3:        #94a3b8;

      --radius-sm:     8px;
      --radius:        14px;
      --radius-lg:     20px;
      --radius-xl:     28px;

      --shadow-sm:     0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow:        0 4px 16px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
      --shadow-lg:     0 16px 40px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.06);
      --shadow-accent: 0 8px 24px rgba(244,63,94,.25);
      --shadow-primary:0 8px 24px rgba(37,99,235,.25);

      --transition:    all .22s cubic-bezier(.4,0,.2,1);
      --font:          'Sora', sans-serif;
      --font-body:     'DM Sans', sans-serif;
    }

    /* ── Reset ─────────────────────────────────── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text-1);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Scrollbar ─────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

    /* ── Layout ────────────────────────────────── */
    .container {
      display: flex;
      min-height: 100vh;
    }

    /* ── Sidebar ───────────────────────────────── */
    .sidebar {
      width: 270px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 28px 20px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .sidebar-header {
      text-align: center;
    }

    .sidebar-header h2 {
      font-family: var(--font);
      font-size: 24px;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .sidebar-header p {
      font-size: 12px;
      color: var(--text-3);
      font-family: var(--font-body);
      font-weight: 300;
      letter-spacing: .3px;
    }

    /* Search */
    .search-bar {
      position: relative;
    }

    .search-bar input {
      width: 100%;
      padding: 11px 16px 11px 42px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 13.5px;
      font-family: var(--font-body);
      background: var(--surface-2);
      color: var(--text-1);
      transition: var(--transition);
    }

    .search-bar input::placeholder { color: var(--text-3); }

    .search-bar input:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--surface);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }

    .search-bar i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-3);
      font-size: 13px;
      pointer-events: none;
      transition: var(--transition);
    }

    /* Add button */
    .add-product-btn {
      width: 100%;
      padding: 13px 16px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: var(--shadow-primary);
      letter-spacing: .2px;
    }

    .add-product-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(37,99,235,.35);
    }

    /* Nav menu */
    .nav-menu ul { 
      list-style: none; 
      display: flex; 
      flex-direction: column; 
      gap: 3px; 
    }

    .nav-menu a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border-radius: var(--radius-sm);
      color: var(--text-2);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: var(--transition);
    }

    .nav-menu a:hover {
      background: var(--primary-light);
      color: var(--primary);
    }

    .nav-menu a.active {
      background: var(--primary-light);
      color: var(--primary);
    }

    /* ── Main content ──────────────────────────── */
    .content {
      flex: 1;
      padding: 36px 32px;
      min-width: 0;
    }

    /* Page header */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .page-title {
      font-family: var(--font);
      font-size: 26px;
      font-weight: 700;
      color: var(--text-1);
      letter-spacing: -.4px;
    }

    /* ── Products grid ─────────────────────────── */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 20px;
    }

    /* ── Product card ──────────────────────────── */
    .product {
      background: var(--surface);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      transition: var(--transition);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .product:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: transparent;
    }

    .product-image-container {
      position: relative;
      width: 100%;
      height: 190px;
      overflow: hidden;
      background: var(--surface-2);
    }

    .image-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--border-hover);
      font-size: 32px;
    }

    .product-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity .4s ease, transform .4s ease;
    }

    .product-image.loaded { opacity: 1; }

    .product:hover .product-image { transform: scale(1.04); }

    .product-info {
      padding: 16px 18px 18px;
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 6px;
    }

    .product-title {
      font-family: var(--font);
      font-size: 15px;
      font-weight: 600;
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .product-description {
      color: var(--text-2);
      font-size: 13px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }

    .product-category {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      background: var(--primary-light);
      color: var(--primary);
      border-radius: 99px;
      font-size: 11.5px;
      font-weight: 600;
      width: fit-content;
    }

    .product-price {
      font-family: var(--font);
      font-size: 17px;
      font-weight: 700;
      color: var(--text-1);
    }

    .contact-btn {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      box-shadow: var(--shadow-accent);
      margin-top: 4px;
    }

    .contact-btn:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    /* ── Modal ─────────────────────────────────── */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 16px;
    }

    #articleModal {
      background: var(--surface);
      padding: 32px;
      border-radius: var(--radius-xl);
      width: 100%;
      max-width: 480px;
      box-shadow: var(--shadow-lg);
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .modal-title {
      font-family: var(--font);
      font-size: 20px;
      font-weight: 700;
      color: var(--text-1);
    }

    .close-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: var(--surface-2);
      border-radius: 99px;
      font-size: 18px;
      color: var(--text-2);
      cursor: pointer;
      transition: var(--transition);
    }

    .close-btn:hover { background: var(--border); color: var(--text-1); }

    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-1);
      margin-bottom: 7px;
    }

    .form-control {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: var(--font-body);
      color: var(--text-1);
      background: var(--surface-2);
      transition: var(--transition);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--surface);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }

    textarea.form-control {
      min-height: 96px;
      resize: vertical;
    }

    select.form-control { cursor: pointer; }

    .file-upload {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 24px 20px;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: var(--transition);
      background: var(--surface-2);
    }

    .file-upload:hover {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .file-upload i {
      font-size: 32px;
      color: var(--text-3);
    }

    .file-upload:hover i { color: var(--primary); }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    .submit-btn {
      flex: 1;
      padding: 13px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: var(--shadow-primary);
    }

    .submit-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .submit-btn:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .cancel-btn {
      flex: 1;
      padding: 13px;
      background: var(--surface-2);
      color: var(--text-2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .cancel-btn:hover {
      background: var(--border);
      color: var(--text-1);
    }

    /* ── Loading ────────────────────────────────── */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px;
      grid-column: 1 / -1;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-3);
    }

    /* ── Toast notification ─────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #0f172a;
      color: #fff;
      padding: 14px 20px;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: var(--shadow-lg);
      z-index: 2000;
    }

    .toast i { color: #4ade80; }

    /* ── Responsive ─────────────────────────────── */
    @media (max-width: 768px) {
      .container { flex-direction: column; }
      .sidebar {
        width: 100%;
        height: auto;
        position: static;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .content { padding: 20px 16px; }
      .page-header { flex-direction: column; align-items: flex-start; gap: 14px; }
      .products { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
      .product-image-container { height: 150px; }
    }

    @media (max-width: 480px) {
      .products { grid-template-columns: 1fr 1fr; }
      .product-image-container { height: 130px; }
      .modal-actions { flex-direction: column; }
    }
  </style>
</head>

<!-- MODAL AJOUT ARTICLE -->
<div id="overlay">
  <div id="articleModal">
    <div class="modal-header">
      <h2 class="modal-title">Ajouter un article</h2>
      <button class="close-btn" id="closeModalBtn">&times;</button>
    </div>
    
    <div class="form-group">
      <label for="titre">Titre de l'article</label>
      <input type="text" id="titre" class="form-control" placeholder="Ex: iPhone 12 Pro Max 256Go">
    </div>
    
    <div class="form-group">
      <label for="prix">Prix (FCFA)</label>

    <div class="form-group">

    </div>
    
    <div class="modal-actions">
      <button class="submit-btn" id="submitArticleBtn">

      <button class="cancel-btn" id="cancelModalBtn">
        <i class="fas fa-times"></i> Annuler
      </button>
    </div>

</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  
  // ============================================
  // CONFIGURATION SUPABASE (CORRIGÉE)
  // ============================================
  const SUPABASE_URL = 'https://zdwcvquucromiyixvfzg.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpkd2N2cXV1Y3JvbWl5aXh2ZnpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODc2OTcsImV4cCI6MjA5MjI2MzY5N30.4Gpie4IQPSGapjC-AgkTAFMRrHfLNhxnF8YxNZq_crk'
  
  // Initialisation correcte de Supabase
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  
  console.log('✅ Supabase initialisé avec:', SUPABASE_URL)

  // Variables globales
  let timeoutSearch
  let lazyImageObserver

  // ============================================
  // FONCTIONS DE LA MODALE
  // ============================================
  
  // Fonction pour ouvrir le modal
  const openModal = async (e) => {
    if (e) e.preventDefault()
    
    console.log('🟢 Tentative d\'ouverture de la modale...')
    
    try {
      // Vérification de l'authentification

      // Si non connecté, redirection vers login

        console.log('🔴 Utilisateur non connecté, redirection...')
        alert("Veuillez vous connecter pour ajouter un article")

      }
      
      // Ouvrir la modale

    } catch (error) {

    }
  }
  
  // Fonction pour fermer le modal
  const closeModal = (e) => {
    if (e) e.preventDefault()
    document.getElementById('overlay').style.display = 'none'
    document.body.style.overflow = 'auto'
    
    // Réinitialiser le formulaire
    document.getElementById('titre').value = ''
    document.getElementById('prix').value = ''
    document.getElementById('description').value = ''
    document.getElementById('image').value = ''
    document.getElementById('categorie').value = ''
    document.getElementById('fileName').textContent = ''
  }

  // ============================================
  // FONCTIONS ARTICLES
  // ============================================

  // Compression d'image
  const compressImage = async (file) => {
    return new Promise((resolve) => {
      if (file.size < 500000) {
        resolve(file)
        return
      }

      const reader = new FileReader()
      reader.readAsDataURL(file)
      reader.onload = (event) => {
        const img = new Image()
        img.src = event.target.result
        img.onload = () => {
          const canvas = document.createElement('canvas')
          const MAX_WIDTH = 1200
          const MAX_HEIGHT = 1200
          let width = img.width
          let height = img.height

          if (width > height) {
            if (width > MAX_WIDTH) {
              height *= MAX_WIDTH / width
              width = MAX_WIDTH
            }
          } else {
            if (height > MAX_HEIGHT) {
              width *= MAX_HEIGHT / height
              height = MAX_HEIGHT
            }
          }

          canvas.width = width
          canvas.height = height
          const ctx = canvas.getContext('2d')
          ctx.drawImage(img, 0, 0, width, height)

          canvas.toBlob((blob) => {
            const compressedFile = new File([blob], file.name, {
              type: 'image/jpeg',
              lastModified: Date.now()
            })
            resolve(compressedFile)
          }, 'image/jpeg', 0.7)
        }
      }
    })
  }

  // Ajouter un article
  const ajouterArticle = async (e) => {
    if (e) {
      e.preventDefault()
      e.stopPropagation()
    }

    console.log('📝 Début ajout article...')

    try {
      const { data: { user }, error: authError } = await supabase.auth.getUser()
      if (authError || !user) {
        alert("Session expirée. Veuillez vous reconnecter.")
        window.location.href = "login.html"
        return
      }

      // Récupération et validation des champs
      const titre = document.getElementById('titre').value.trim()
      const prix = parseFloat(document.getElementById('prix').value)
      const description = document.getElementById('description').value.trim()
      const imageFile = document.getElementById('image').files[0]
      const categorie = document.getElementById('categorie').value

      if (!titre || isNaN(prix) || !description || !imageFile || !categorie) {
        alert("Veuillez remplir tous les champs correctement.")
        return
      }

      // Mise à jour UI
      const submitBtn = document.getElementById('submitArticleBtn')
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Publication...'
      submitBtn.disabled = true

      // Compression et upload de l'image
      const compressedImage = await compressImage(imageFile)
      const fileExt = compressedImage.name.split('.').pop()
      const filePath = `articles/${user.id}-${Date.now()}.${fileExt}`
      
      const { error: uploadError } = await supabase.storage
        .from('article-images')
        .upload(filePath, compressedImage, {
          cacheControl: '3600',
          upsert: false,
          contentType: compressedImage.type
        })
    
      if (uploadError) {
        console.error("Erreur upload:", uploadError)
        throw uploadError
      }

      // Récupération de l'URL publique
      const { data: { publicUrl } } = supabase.storage
        .from('article-images')
        .getPublicUrl(filePath)

      // Insertion dans la base de données
      const { data: article, error: insertError } = await supabase
        .from('articles')
        .insert([{
          titre,
          prix,
          description,
          image_url: publicUrl,
          categorie,
          user_id: user.id,
          created_at: new Date().toISOString()
        }])
        .select()

      if (insertError) throw insertError

      console.log('✅ Article ajouté:', article[0])

      // Afficher l'article
      afficherArticle(article[0])
      closeModal()
      
      // Notification de succès
      afficherToast('Article publié avec succès !', 'success')

    } catch (error) {
      console.error('❌ Erreur ajout article:', error)
      afficherToast(`Erreur: ${error.message}`, 'error')
    } finally {
      const submitBtn = document.getElementById('submitArticleBtn')
      if (submitBtn) {
        submitBtn.innerHTML = '<i class="fas fa-plus"></i> Publier'
        submitBtn.disabled = false
      }
    }
  }

  // Afficher un toast de notification
  const afficherToast = (message, type = 'success') => {
    const toast = document.createElement('div')
    toast.className = 'toast'
    toast.innerHTML = `
      <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-triangle'}"></i>
      <span>${message}</span>
    `
    document.body.appendChild(toast)
    setTimeout(() => toast.remove(), 3000)
  }

  // Afficher un article dans la grille
  const afficherArticle = (article) => {
    const container = document.getElementById('productList')
    const div = document.createElement('div')
    div.className = 'product'
    
    div.innerHTML = `
      <div class="product-image-container">
        <div class="image-placeholder">
          <i class="fas fa-image"></i>
        </div>
        <img data-src="${article.image_url}" alt="${article.titre}" class="product-image" 
             onload="this.classList.add('loaded'); this.previousElementSibling.style.display='none'"
             onerror="this.onerror=null; this.previousElementSibling.style.display='flex'">
      </div>
      <div class="product-info">
        <h3 class="product-title">${article.titre}</h3>
        <p class="product-description">${article.description}</p>
        <span class="product-category">${article.categorie}</span>
        <p class="product-price">${article.prix.toLocaleString()} FCFA</p>
        <button class="contact-btn" data-user-id="${article.user_id}" data-article-id="${article.id}">
          <i class="fas fa-envelope"></i> Contacter
        </button>
      </div>
    `
    container.prepend(div)
    
    // Observer l'image pour lazy loading
    const img = div.querySelector('.product-image')
    if (lazyImageObserver) {
      lazyImageObserver.observe(img)
    } else {
      img.src = img.dataset.src
    }
    
    // Gestionnaire pour le bouton contacter
    div.querySelector('.contact-btn').addEventListener('click', () => {
      ouvrirMessagerie(article.user_id, article.id)
    })
  }

  // Rechercher des articles
  const rechercherArticles = async () => {
    const searchTerm = document.getElementById('searchInput').value.trim()
    const productList = document.getElementById('productList')
    
    productList.innerHTML = `<div class="loading"><div class="spinner"></div></div>`
    
    try {
      let query = supabase
        .from('articles')
        .select('*')
        .order('created_at', { ascending: false })

      if (searchTerm) {
        query = query.or(
          `titre.ilike.%${searchTerm}%,description.ilike.%${searchTerm}%,categorie.ilike.%${searchTerm}%`
        )
      }

      const { data, error } = await query

      if (error) throw error

      productList.innerHTML = ''

      if (data.length === 0) {
        productList.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-search" style="font-size: 48px; margin-bottom: 16px;"></i>
            <p>${searchTerm ? `Aucun résultat pour "${searchTerm}"` : 'Aucun article disponible'}</p>
          </div>
        `
        return
      }

      data.forEach(afficherArticle)

    } catch (error) {
      console.error("Erreur de recherche:", error)
      productList.innerHTML = `
        <div class="empty-state" style="color: #dc3545;">
          <i class="fas fa-exclamation-triangle"></i>
          <p>Erreur lors du chargement des articles</p>
        </div>
      `
    }
  }

  // Ouvrir la messagerie
  const ouvrirMessagerie = async (vendeurId, articleId) => {
    try {
      const { data: { user }, error: authError } = await supabase.auth.getUser()
      
      if (authError || !user) {
        alert("Veuillez vous connecter pour envoyer un message")
        window.location.href = "login.html"
        return
      }

      // Vérifier si une conversation existe déjà (SYNTAXE CORRIGÉE)
      const { data: existingConversation, error: convError } = await supabase
        .from('conversations')
        .select('id')
        .or(`and(user1.eq.${user.id},user2.eq.${vendeurId}),and(user1.eq.${vendeurId},user2.eq.${user.id})`)
        .single()

      let conversationId

      if (convError || !existingConversation) {
        // Créer une nouvelle conversation
        const { data: newConversation, error: createError } = await supabase
          .from('conversations')
          .insert([{
            user1: user.id,
            user2: vendeurId,
            article_id: articleId,
            created_at: new Date().toISOString()
          }])
          .select()
          .single()

        if (createError) throw createError
        conversationId = newConversation.id
      } else {
        conversationId = existingConversation.id
      }

      window.location.href = `messagerie.html?conversation=${conversationId}`

    } catch (error) {
      console.error("Erreur messagerie:", error)
      alert("Une erreur est survenue lors de l'ouverture de la messagerie")
    }
  }

  // Initialisation du lazy loading
  const initLazyLoading = () => {
    if ('IntersectionObserver' in window) {
      lazyImageObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const img = entry.target
            img.src = img.dataset.src
            img.removeAttribute('data-src')
            lazyImageObserver.unobserve(img)
          }
        })
      }, {
        rootMargin: '200px 0px'
      })
    }
  }

  // ============================================
  // INITIALISATION
  // ============================================
  document.addEventListener('DOMContentLoaded', () => {
    console.log('🚀 Application démarrée')
    
    // Initialiser le lazy loading
    initLazyLoading()

    // Écouteur recherche avec debounce
    const searchInput = document.getElementById('searchInput')
    if (searchInput) {
      searchInput.addEventListener('input', () => {
        clearTimeout(timeoutSearch)
        timeoutSearch = setTimeout(() => {
          rechercherArticles().catch(console.error)
        }, 300)
      })
    }

    // Écouteurs pour la modale
    document.getElementById('addProductBtn')?.addEventListener('click', openModal)
    document.getElementById('closeModalBtn')?.addEventListener('click', closeModal)
    document.getElementById('cancelModalBtn')?.addEventListener('click', closeModal)
    document.getElementById('overlay')?.addEventListener('click', (e) => {
      if (e.target.id === 'overlay') closeModal(e)
    })
    
    // Écouteur pour le formulaire
    document.getElementById('submitArticleBtn')?.addEventListener('click', ajouterArticle)
    
    // Gestion de l'upload de fichier
    const fileUploadBtn = document.getElementById('fileUploadBtn')
    const fileInput = document.getElementById('image')
    
    fileUploadBtn?.addEventListener('click', () => {
      fileInput.click()
    })
    
    fileInput?.addEventListener('change', function(e) {
      const fileName = document.getElementById('fileName')
      if (this.files[0]) {
        fileName.textContent = `Fichier sélectionné: ${this.files[0].name}`
      } else {
        fileName.textContent = ''
      }
    })

    // Fermer la modale avec Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeModal(e)
      }
    })

    // Chargement initial des articles
    rechercherArticles().catch(console.error)
    
    console.log('✅ Initialisation terminée')
  })
</script>
</body>
</html>
